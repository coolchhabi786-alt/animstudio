name: Deploy AnimStudio API

on:
  push:
    branches:
      - main
      - backend

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Backend Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build and Test
        run: |
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release

      - name: Build Docker Image
        run: |
          docker build . -t animstudioacr.azurecr.io/animstudio-api:${{ github.sha }}

      - name: Push Docker Image to ACR
        run: |
          az acr login --name animstudioacr
          docker push animstudioacr.azurecr.io/animstudio-api:${{ github.sha }}

      - name: Blue-Green Deploy Container App
        run: |
          az containerapp revision set-traffic --name AnimStudioAPI \
            --revisions "${{ github.sha }}=0" --revision-weight "latest=100" \
            --resource-group animstudio-rg