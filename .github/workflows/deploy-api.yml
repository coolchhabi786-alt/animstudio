name: Deploy API

on:
  push:
    branches:
      - main
      - backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Build Project
      run: dotnet build --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test --no-build --configuration Release

    - name: Build Docker Image
      run: |
        docker build -t animstudio.azurecr.io/animstudio-api:${{ github.sha }} -f backend/Dockerfile .

    - name: Push Docker Image
      run: |
        az acr login --name AnimStudioACR
        docker push animstudio.azurecr.io/animstudio-api:${{ github.sha }}

    - name: Update Container App with Blue-Green Deployment
      run: |
        az containerapp update \
          --name AnimStudio.API \
          --image animstudio.azurecr.io/animstudio-api:${{ github.sha }} \
          --revision-suffix "${{ github.sha }}" \
          --location "eastus" \
          --cpu 2 --memory 4Gi

    - name: Smoke Test Container App
      run: |
        RESPONSE=$(curl --write-out '%{http_code}' --silent --output /dev/null http://animstudio.api.internal.azurecontainerapp.io/health/ready)
        if [[ "$RESPONSE" != "200" ]]; then
           az containerapp revision deactivate --name AnimStudio.API --revision "0-${{ github.sha }}"
           exit 1
        fi