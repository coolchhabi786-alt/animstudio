# Local development infrastructure — SQL Server + Redis
# Run: docker compose up -d
# Stop: docker compose down
version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: animstudio-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "AnimStudio!Dev123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P AnimStudio!Dev123 -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: animstudio-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass AnimRedis!Dev123
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "AnimRedis!Dev123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis Commander UI at http://localhost:8081
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: animstudio-redis-ui
    environment:
      REDIS_HOSTS: "local:redis:6379:0:AnimRedis!Dev123"
    ports:
      - "8081:8081"
    depends_on:
      - redis

volumes:
  sqldata:
  redisdata:
