openapi: 3.1.0
info:
  title: AnimStudio Projects and Episode Management API
  version: 1.0
servers:
  - url: /api/v1
paths:
  /projects:
    post:
      summary: Create a new project
      operationId: CreateProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDto'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    get:
      summary: Retrieve a paginated list of projects
      operationId: GetProjects
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: teamId
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedList_ProjectDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /projects/{id}:
    get:
      summary: Retrieve a single project by ID
      operationId: GetProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Single project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDto'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
  /projects/{id}:
    put:
      summary: Update a project by ID
      operationId: UpdateProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project successfully updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDto'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
  /projects/{id}:
    delete:
      summary: Soft delete a project by ID
      operationId: DeleteProject
      tags:
        - Projects
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Project successfully deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found
...
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CreateProjectRequest:
      type: object
      properties:
        teamId:
          type: string
        name:
          type: string
        description:
          type: string
      required:
        - teamId
        - name
    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name
    ProjectDto:
      type: object
      properties:
        id:
          type: string
        teamId:
          type: string
        name:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isDeleted:
          type: boolean
        deletedAt:
          type: string
          format: date-time
        deletedByUserId:
          type: string
      required:
        - id
        - teamId
        - name
    PaginatedList_ProjectDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectDto'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
      required:
        - items
        - page
        - pageSize
        - total